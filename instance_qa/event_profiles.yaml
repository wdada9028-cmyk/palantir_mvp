events:
  generic_incident:
    relation_priority:
      - OCCURS_IN
      - ASSIGNS
      - ASSIGNED_TO
      - APPLIES_TO
      - HAS
    impact_propagation: {}
  power_outage:
    relation_priority:
      - OCCURS_IN
      - ASSIGNS
      - APPLIES_TO
      - HAS
      - ASSIGNED_TO
    impact_propagation:
      PoDPosition:
        - relation: ASSIGNED_TO
          neighbor_entity: PoD
        - relation: OCCURS_AT
          neighbor_entity: WorkAssignment
      WorkAssignment:
        - relation: ASSIGNS
          neighbor_entity: PoD
      PoD:
        - relation: HAS
          neighbor_entity: ActivityInstance
        - relation: APPLIES_TO
          neighbor_entity: PoDSchedule
  fire:
    relation_priority:
      - OCCURS_IN
      - ASSIGNS
      - APPLIES_TO
      - HAS
      - ASSIGNED_TO
    impact_propagation:
      PoDPosition:
        - relation: ASSIGNED_TO
          neighbor_entity: PoD
        - relation: OCCURS_AT
          neighbor_entity: WorkAssignment
      WorkAssignment:
        - relation: ASSIGNS
          neighbor_entity: PoD
      PoD:
        - relation: HAS
          neighbor_entity: ActivityInstance
        - relation: APPLIES_TO
          neighbor_entity: PoDSchedule
  delay:
    relation_priority:
      - DEPENDS_ON
      - CONSTRAINS
      - APPLIES_TO
      - ASSIGNS
      - OCCURS_IN
    impact_propagation: {}
  capacity_loss:
    relation_priority:
      - EXECUTES
      - ASSIGNS
      - OCCURS_IN
      - APPLIES_TO
      - HAS
    impact_propagation: {}
  access_blocked:
    relation_priority:
      - OCCURS_IN
      - ASSIGNS
      - APPLIES_TO
      - HAS
      - ASSIGNED_TO
    impact_propagation:
      PoDPosition:
        - relation: ASSIGNED_TO
          neighbor_entity: PoD
        - relation: OCCURS_AT
          neighbor_entity: WorkAssignment
      WorkAssignment:
        - relation: ASSIGNS
          neighbor_entity: PoD
      PoD:
        - relation: HAS
          neighbor_entity: ActivityInstance
        - relation: APPLIES_TO
          neighbor_entity: PoDSchedule
